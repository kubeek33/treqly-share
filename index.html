<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TREQLY — Workout shared with you</title>
<meta property="og:title" content="TREQLY — Workout shared with you">
<meta property="og:description" content="Tap to open this workout in TREQLY and add it to your training plan">
<meta property="og:image" content="https://i.imgur.com/placeholder.png">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0A0F;font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Helvetica Neue',sans-serif;padding:20px}
.c{max-width:400px;width:100%;text-align:center}
.logo{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#FF375F,#8B5CF6);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 32px rgba(255,55,95,0.3)}
.logo span{font-size:32px;font-weight:900;color:#fff}
.brand{color:rgba(255,255,255,0.4);font-size:13px;font-weight:700;letter-spacing:2px;margin-bottom:24px}
.icon{width:48px;height:48px;border-radius:50%;background:rgba(255,55,95,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
h1{color:#fff;font-size:26px;font-weight:800;margin-bottom:10px;line-height:1.2}
.sub{color:rgba(255,255,255,0.45);font-size:15px;margin-bottom:32px;line-height:1.5}
#open-btn{display:none;align-items:center;justify-content:center;width:100%;padding:16px;background:linear-gradient(135deg,#FF375F,#E8255A);color:#fff;font-size:17px;font-weight:700;border-radius:14px;text-decoration:none;box-shadow:0 6px 24px rgba(255,55,95,0.35)}
#open-btn:active{transform:scale(0.97)}
#no-data{display:none;color:rgba(255,255,255,0.3);font-size:14px;margin-top:16px}
.store{margin-top:24px}
.store p{color:rgba(255,255,255,0.25);font-size:13px;margin-bottom:8px}
.store a{color:#FF375F;font-size:14px;font-weight:600;text-decoration:none}
.foot{color:rgba(255,255,255,0.15);font-size:11px;margin-top:48px}
</style>
</head>
<body>
<div class="c">
<div class="logo"><span>T</span></div>
<p class="brand">TREQLY</p>
<div class="icon"><svg width="24" height="24" fill="none" stroke="#FF375F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></div>
<h1>Workout shared with you</h1>
<p class="sub">Tap the button below to open this workout in TREQLY and add it to your training plan</p>
<a id="open-btn" href="#">Open in TREQLY</a>
<p id="no-data"></p>
<div class="store">
<p>Don't have the app?</p>
<a href="https://apps.apple.com/app/treqly">Download TREQLY →</a>
</div>
<p class="foot">TREQLY — Your fitness companion</p>
</div>
<script>
(function(){
var d=window.location.hash.substring(1);
if(d&&d.length>5){
var b=document.getElementById('open-btn');
b.href='treqly://workout/'+d;
b.style.display='flex';
}else{
var m=document.getElementById('no-data');
m.textContent='Open a shared workout link to import it';
m.style.display='block';
}
})();
</script>
</body>
</html>
